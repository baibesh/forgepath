name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build binary
        run: |
          GOOS=linux GOARCH=amd64 go build -o forgepath .

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: forgepath
          target: /opt/forgepath/

      - name: Update .env and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: OPENAI_API_KEY
          script: |
            cd /opt/forgepath
            grep -q '^OPENAI_API_KEY=' .env 2>/dev/null && sed -i "s|^OPENAI_API_KEY=.*|OPENAI_API_KEY=${OPENAI_API_KEY}|" .env || echo "OPENAI_API_KEY=${OPENAI_API_KEY}" >> .env
            systemctl restart forgepath
            sleep 2
            systemctl is-active forgepath
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  deploy-webapp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install and build
        working-directory: webapp
        run: |
          npm ci
          npx prisma generate
          npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Prepare standalone bundle
        working-directory: webapp
        run: |
          cp -r .next/static .next/standalone/.next/static
          mkdir -p .next/standalone/public
          cp -r public/. .next/standalone/public/ 2>/dev/null || true

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: webapp/.next/standalone/.
          target: /opt/forgepath-webapp/
          strip_components: 3
          overwrite: true

      - name: Restart webapp
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: DATABASE_URL,BOT_TOKEN
          script: |
            cd /opt/forgepath-webapp
            echo "DATABASE_URL=${DATABASE_URL}" > .env
            echo "BOT_TOKEN=${BOT_TOKEN}" >> .env
            pm2 restart forgepath-webapp || pm2 start server.js --name forgepath-webapp
            sleep 2
            pm2 status forgepath-webapp
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
