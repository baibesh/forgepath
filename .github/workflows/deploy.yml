name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build binary
        run: GOOS=linux GOARCH=amd64 go build -o forgepath .

      - name: Stop bot
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: systemctl stop forgepath || true

      - name: Upload binary
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: forgepath
          target: /opt/forgepath/
          overwrite: true

      - name: Start bot
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: OPENAI_API_KEY
          script_stop: true
          script: |
            cd /opt/forgepath
            chmod +x forgepath
            grep -q '^OPENAI_API_KEY=' .env 2>/dev/null && sed -i "s|^OPENAI_API_KEY=.*|OPENAI_API_KEY=${OPENAI_API_KEY}|" .env || echo "OPENAI_API_KEY=${OPENAI_API_KEY}" >> .env
            systemctl start forgepath
            sleep 2
            systemctl is-active forgepath
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  deploy-webapp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install and build
        working-directory: webapp
        run: |
          npm ci
          npx prisma generate
          npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Prepare bundle
        working-directory: webapp
        run: |
          cp -r .next/static .next/standalone/.next/static
          mkdir -p .next/standalone/public
          cp -r public/. .next/standalone/public/ 2>/dev/null || true
          tar -czf webapp-bundle.tar.gz -C .next/standalone .
          ls -lh webapp-bundle.tar.gz

      - name: Upload and deploy
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        working-directory: webapp
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $SERVER_HOST >> ~/.ssh/known_hosts 2>/dev/null

          scp -i ~/.ssh/deploy_key webapp-bundle.tar.gz root@$SERVER_HOST:/tmp/webapp-bundle.tar.gz

          ssh -i ~/.ssh/deploy_key root@$SERVER_HOST bash -s << 'DEPLOY'
          set -e
          pm2 stop forgepath-webapp || true
          rm -rf /opt/forgepath-webapp/.next /opt/forgepath-webapp/server.js /opt/forgepath-webapp/node_modules /opt/forgepath-webapp/package.json
          tar -xzf /tmp/webapp-bundle.tar.gz -C /opt/forgepath-webapp/
          rm -f /tmp/webapp-bundle.tar.gz
          DEPLOY

          ssh -i ~/.ssh/deploy_key root@$SERVER_HOST bash -s << ENVDEPLOY
          cd /opt/forgepath-webapp
          echo "DATABASE_URL=${DATABASE_URL}" > .env
          echo "BOT_TOKEN=${BOT_TOKEN}" >> .env
          pm2 start server.js --name forgepath-webapp 2>/dev/null || pm2 restart forgepath-webapp
          for i in 1 2 3 4 5; do
            if curl -sf --max-time 5 http://localhost:3000/ > /dev/null 2>&1; then
              echo "Health check passed on attempt \$i"
              exit 0
            fi
            echo "Waiting... attempt \$i"
            sleep 2
          done
          echo "Health check failed after 5 attempts"
          pm2 logs forgepath-webapp --lines 10 --nostream
          exit 1
          ENVDEPLOY

          rm -f ~/.ssh/deploy_key
